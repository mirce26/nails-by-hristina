<!DOCTYPE html>

<html lang="mk">
<head>
<meta charset="utf-8"/>
<title>Услуги - Nails by Hristina</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="Услуги и цени за маникир, гел нокти, надградба и дизајн во Nails by Hristina - Штип." name="description"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --primary: #f06292;
            --primary-light: #f8bbd0;
            --bg-light: #fff5fb;
            --text-main: #333333;
            --card-bg: rgba(255, 255, 255, 0.96);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #ffffff;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url("pozadina1.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* NAVBAR – ист како index.html */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background: rgba(30, 13, 18, 0.40);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 1.15rem;
            white-space: nowrap;
        }

        .brand span {
            color: #ffffff;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 30%, #f8bbd0 0, #f48fb1 45%, #f06292 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 3px rgba(0,0,0,0.35);
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            border: 2px solid rgba(255,255,255,0.7);
        }

        .nav-links {
            display: flex;
            gap: 24px;
            font-size: 1.05rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #fdfdfd;
            opacity: 0.9;
            padding: 6px 14px;
            border-radius: 999px;
            transition: background 0.2s ease, opacity 0.15s ease, transform 0.15s ease;
        }

        .nav-links a:hover {
            opacity: 1;
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        /* HAMBURGER копче – исто како на index.html */
        .nav-toggle {
            display: none;
            background: rgba(0,0,0,0.55);
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.7);
            cursor: pointer;
            width: 40px;
            height: 40px;
            padding: 0;
            margin-left: 12px;
            box-shadow: 0 0 6px rgba(0,0,0,0.35);
            position: relative;
        }

        .nav-toggle span {
            display: block;
            width: 24px;
            height: 3px;
            border-radius: 999px;
            background: #ffffff;
            margin: 3px 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* кога е отворено – правиме X на средина во кругчето */
        .nav-toggle.open span {
            position: absolute;
            top: 50%;
            left: 50%;
            margin: 0;
            width: 24px;
        }

        .nav-toggle.open span:nth-child(1) {
            transform: translate(-50%, -50%) rotate(45deg);
        }
        .nav-toggle.open span:nth-child(2) {
            opacity: 0;
        }
        .nav-toggle.open span:nth-child(3) {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        /* СОДРЖИНА */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px 60px 16px;
            flex: 1; /* за footer да паѓа долу */
        }

        .page-header {
            padding: 20px 0 10px;
        }

        .hero-title {
            font-size: clamp(2rem, 3.4vw, 2.4rem);
            font-weight: 600;
            margin: 0 0 6px 0;
        }

        .hero-text {
            font-size: 0.95rem;
            max-width: 520px;
            opacity: 0.9;
        }

        .service-list {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: rgba(245, 197, 214, 0.96);
            border-radius: 18px;
            padding: 14px 16px 16px 16px;
            box-shadow: 0 14px 32px rgba(0,0,0,0.13);
            border: 1px solid rgba(240,98,146,0.10);
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: #333333;
        }

        .service-name {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .service-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .service-price {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            margin-top: 4px;
        }

        .service-note {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        a { color: var(--primary); }

        a:hover { text-decoration: underline; }

        footer {
            padding: 18px 16px 30px 16px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* МАЛИ ЕКРАНИ (телефон) – navbar ист како index.html */
        @media (max-width: 780px) {
            body {
                background-attachment: scroll;
            }

            .nav-inner {
                padding: 10px 16px;
            }

            .nav-toggle {
                display: inline-flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .nav-links {
                position: absolute;
                top: calc(100% + 8px);
                left: 16px;
                right: 16px;
                background: rgba(30,13,18,0.92);
                border-radius: 18px;
                padding: 12px 0;
                flex-direction: column;
                gap: 4px;
                box-shadow: 0 18px 32px rgba(0,0,0,0.35);
                display: none;
                align-items: flex-start;
            }

            .nav-links.open { display: flex; }

            .nav-links a {
                width: 100%;
                text-align: left;
                padding: 10px 20px;
                border-radius: 0;
            }
        }

        @media (max-width: 480px) {
            .brand {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<header class="navbar">
<div class="nav-inner">
<div class="brand">
<div class="brand-mark">NH</div>
<span>Nails by Hristina</span>
</div>
<!-- ист hamburger како на index.html -->
<button aria-label="Отвори мени" class="nav-toggle">
<span></span>
<span></span>
<span></span>
</button>
<nav class="nav-links">
<a href="index.html">Почетна</a>
<a href="uslugi.html">Услуги</a>
<a href="galerija.html">Галерија</a>
<a href="kontakt.html">Контакт</a>
</nav>
</div>
</header>
<div class="wrapper">
<section class="page-header">
<h1 class="hero-title">Услуги и цени</h1>
<p class="hero-text">
           Детален преглед на услугите што ги нудам, за полесно да ја одбереш онаа што ти одговара. ✨
        </p>
</section>
<section class="service-list" id="services-list"></section>
</div>
<footer>
    © 2025 Nails by Hristina – сите права задржани.
</footer>
<script>
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');

    toggle.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        toggle.classList.toggle('open');
    });
</script><script src="content-loader.js"></script>
</body>
</html>
